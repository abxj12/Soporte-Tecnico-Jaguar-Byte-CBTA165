
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soporte Técnico - JaguarByte</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <img src="jaguarbyte.jpg" alt="Logo JaguarByte" class="logo" />
    <h1>Contacto inicial</h1>
    <p>Por favor, ingresa tus datos para comenzar el proceso de soporte técnico.</p>

    <form action="registro.html" method="GET">
      <input type="text" name="nombre" placeholder="Tu nombre" required />
      <input type="email" name="correo" placeholder="Tu correo electrónico" required />
      <input type="tel" name="telefono" placeholder="Tu número de teléfono" required />
      <button type="submit">Continuar</button>
    </form>

    <footer>
      <p>Contacto: jaguar.byte00@gmail.com | +52 1 988 105 2427</p>
    </footer>
  </div>
</body>
</html>
